<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>畢業照拍攝投票 - 熱力圖版</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --hot-1: #ffeaa7; /* 1-2票：淡黃 */
            --hot-2: #fab1a0; /* 3-5票：淺橘 */
            --hot-3: #ff7675; /* 6票以上：珊瑚紅 */
            --selected: #00cec9; /* 自己選中的顏色 */
        }

        body { font-family: -apple-system, sans-serif; background: #f4f7f6; margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: 0 auto; background: white; border-radius: 24px; padding: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        
        h2 { text-align: center; color: #2d3436; margin-bottom: 5px; }
        .legend { display: flex; justify-content: center; gap: 10px; font-size: 0.75rem; margin-bottom: 20px; color: #636e72; }
        .legend-item { display: flex; align-items: center; gap: 4px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; }

        .calendar-title { font-weight: bold; font-size: 1.1rem; color: #2d3436; margin: 20px 0 10px; display: flex; justify-content: space-between; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .weekday { text-align: center; font-size: 0.75rem; color: #b2bec3; padding-bottom: 8px; }
        
        .day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            background: #fdfdfd;
            border: 1px solid #f0f0f0;
            font-size: 0.95rem;
            cursor: pointer;
            position: relative;
            transition: all 0.2s ease;
        }

        /* 熱力圖顏色分階 */
        .day.hot-low { background-color: var(--hot-1); border-color: #f1d48d; }
        .day.hot-mid { background-color: var(--hot-2); border-color: #e19586; color: white; }
        .day.hot-high { background-color: var(--hot-3); border-color: #d65a58; color: white; }
        
        /* 選中樣式優先 */
        .day.selected { background-color: var(--selected) !important; color: white !important; border-color: #00a8a8 !important; transform: scale(1.05); z-index: 2; box-shadow: 0 4px 10px rgba(0,206,201,0.3); }
        .day.selected::after { content: '我選這天'; position: absolute; bottom: 2px; font-size: 7px; font-weight: bold; }

        .day.not-current { visibility: hidden; }
        .vote-badge { position: absolute; top: 2px; right: 4px; font-size: 8px; opacity: 0.7; }

        .btn-group { margin-top: 25px; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 14px; font-size: 1rem; font-weight: bold; cursor: pointer; margin-bottom: 12px; transition: 0.2s; }
        .btn-submit { background: var(--primary); color: white; }
        .btn-reset { background: #f1f2f6; color: #57606f; }

        #confirm-panel { display: none; text-align: center; }
        .date-chip { display: inline-block; background: #f1f2f6; padding: 8px 15px; border-radius: 20px; margin: 5px; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container" id="main-view">
    <h2>🎓 拍攝時間挑選</h2>
    <div class="legend">
        <div class="legend-item"><div class="dot" style="background:var(--hot-1)"></div> 稍有人氣</div>
        <div class="legend-item"><div class="dot" style="background:var(--hot-2)"></div> 熱門日期</div>
        <div class="legend-item"><div class="dot" style="background:var(--hot-3)"></div> 超多人選</div>
        <div class="legend-item"><div class="dot" style="background:var(--selected)"></div> 你的選擇</div>
    </div>

    <div id="calendar-area"></div>

    <div class="btn-group">
        <button class="btn btn-submit" onclick="showConfirm()">送出投票並查看確認單</button>
        <button class="btn btn-reset" onclick="resetAll()">清除所有數據(管理員用)</button>
    </div>
</div>

<div class="container" id="confirm-panel">
    <h2 style="color:var(--selected)">確認你的日期</h2>
    <p style="color:#636e72">同學，你一共勾選了 <span id="count" style="font-weight:bold;color:var(--primary)">0</span> 天：</p>
    <div id="confirmed-list" style="margin: 20px 0;"></div>
    <button class="btn btn-submit" onclick="location.reload()">回首頁</button>
</div>

<script>
    const selectedDates = new Set();
    // 取得歷史票數 (模擬多人投票結果)
    let globalVotes = JSON.parse(localStorage.getItem('grad_hot_map')) || {};

    function renderCalendars() {
        const area = document.getElementById('calendar-area');
        area.innerHTML = '';
        // 渲染 5 月 (2026/5/1 是週五)
        createMonth(area, "2026年 5月", 5, 5, 31);
        // 渲染 6 月 (2026/6/1 是週一)
        createMonth(area, "2026年 6月", 6, 1, 30);
    }

    function createMonth(parent, title, month, startDay, totalDays) {
        const header = document.createElement('div');
        header.className = 'calendar-title';
        header.innerHTML = `<span>${title}</span>`;
        parent.appendChild(header);

        const grid = document.createElement('div');
        grid.className = 'calendar-grid';
        
        const weeks = ['日','一','二','三','四','五','六'];
        weeks.forEach(w => {
            const div = document.createElement('div');
            div.className = 'weekday';
            div.innerText = w;
            grid.appendChild(div);
        });

        for(let i=0; i<startDay; i++) {
            const div = document.createElement('div');
            div.className = 'day not-current';
            grid.appendChild(div);
        }

        for(let d=1; d<=totalDays; d++) {
            const dateStr = `${month}/${d}`;
            const div = document.createElement('div');
            const votes = globalVotes[dateStr] || 0;
            
            div.className = 'day';
            // 根據票數加上熱力圖 class
            if (votes >= 6) div.classList.add('hot-high');
            else if (votes >= 3) div.classList.add('hot-mid');
            else if (votes >= 1) div.classList.add('hot-low');

            div.innerHTML = `<span class="vote-badge">${votes > 0 ? votes+'P' : ''}</span>${d}`;
            
            div.onclick = () => {
                if(selectedDates.has(dateStr)) {
                    selectedDates.delete(dateStr);
                    div.classList.remove('selected');
                } else {
                    selectedDates.add(dateStr);
                    div.classList.add('selected');
                }
            };
            grid.appendChild(div);
        }
        parent.appendChild(grid);
    }

    function showConfirm() {
        if(selectedDates.size === 0) {
            alert('記得選日期喔！');
            return;
        }

        // 更新數據
        selectedDates.forEach(date => {
            globalVotes[date] = (globalVotes[date] || 0) + 1;
        });
        localStorage.setItem('grad_hot_map', JSON.stringify(globalVotes));

        // 切換畫面
        document.getElementById('main-view').style.display = 'none';
        document.getElementById('confirm-panel').style.display = 'block';
        document.getElementById('count').innerText = selectedDates.size;
        
        const list = document.getElementById('confirmed-list');
        list.innerHTML = Array.from(selectedDates).map(d => `<div class="date-chip">📅 ${d}</div>`).join('');
    }

    function resetAll() {
        if(confirm('確定要清除所有人的投票數據嗎？')) {
            localStorage.removeItem('grad_hot_map');
            location.reload();
        }
    }

    renderCalendars();
</script>

</body>
</html>
